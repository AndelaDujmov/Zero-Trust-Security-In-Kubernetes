name: CI

on: [push]

env:
  BACKEND_SERVICE_DIR: backend-service/
  API_SERVICE_DIR: api-service/
  FRONTEND_SERVICE_DIR: frontend-service/
  BACKEND_TARGET_DIR: backend-service/target/
  API_TARGET_DIR: api-service/target/

jobs:

  build-backend-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: |
          cd $BACKEND_SERVICE_DIR
          mvn clean package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: $BACKEND_TARGET_DIR

  build-api-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build API
        run: |
          cd $API_SERVICE_DIR
          mvn clean package

      - name: Upload api artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: $API_TARGET_DIR

  test-backend-service:
    runs-on: ubuntu-latest
    needs: build-backend-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test backend
        run: |
          cd $BACKEND_SERVICE_DIR
          mvn test

  test-api-service:
    runs-on: ubuntu-latest
    needs: build-api-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test API
        run: |
          cd $API_SERVICE_DIR
          mvn test

  dockerize-backend-service:
    runs-on: ubuntu-latest
    needs: test-backend-service
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: $BACKEND_TARGET_DIR

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_SERVICE_DIR }}
          push: false
          tags: backend-service:latest

  dockerize-api-service:
    runs-on: ubuntu-latest
    needs: test-api-service
    steps:
      - uses: actions/checkout@v4

      - name: Download api artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: $API_TARGET_DIR

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_SERVICE_DIR }}
          push: false
          tags: api-service:latest

  dockerize-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend-service, test-api-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_SERVICE_DIR }}
          push: false
          tags: frontend-service:latest

