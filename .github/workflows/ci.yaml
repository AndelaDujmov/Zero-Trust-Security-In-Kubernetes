name: CI

on: [push]

env:
  BACKEND_SERVICE_DIR: backend-service
  API_SERVICE_DIR: api-service
  FRONTEND_SERVICE_DIR: frontend-service

jobs:

  build-backend-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: mvn -f ${{ env.BACKEND_SERVICE_DIR }}/pom.xml clean package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: ${{ env.BACKEND_SERVICE_DIR }}/target/

  build-api-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build API
        run: mvn -f ${{ env.API_SERVICE_DIR }}/pom.xml clean package

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: ${{ env.API_SERVICE_DIR }}/target/

  test-backend-service:
    runs-on: ubuntu-latest
    needs: build-backend-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test backend
        run: mvn -f ${{ env.BACKEND_SERVICE_DIR }}/pom.xml test

  test-api-service:
    runs-on: ubuntu-latest
    needs: build-api-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test API
        run: mvn -f ${{ env.API_SERVICE_DIR }}/pom.xml test

  dockerize-backend-service:
    runs-on: ubuntu-latest
    needs: test-backend-service
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: ${{ env.BACKEND_SERVICE_DIR }}/target/

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_SERVICE_DIR }}
          push: false
          tags: backend-service:latest

  dockerize-api-service:
    runs-on: ubuntu-latest
    needs: test-api-service
    steps:
      - uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: ${{ env.API_SERVICE_DIR }}/target/

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.API_SERVICE_DIR }}
          push: false
          tags: api-service:latest

  dockerize-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend-service, test-api-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_SERVICE_DIR }}
          push: false
          tags: frontend-service:latest

