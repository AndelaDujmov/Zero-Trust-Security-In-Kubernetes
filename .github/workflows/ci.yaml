name: CI

on: [push]

env:
  BACKEND_SERVICE_DIR: backend-service
  API_SERVICE_DIR: api-service
  FRONTEND_SERVICE_DIR: frontend-service

jobs:

  test-backend-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test backend
        run: mvn -f ${{ env.BACKEND_SERVICE_DIR }}/pom.xml test

  test-api-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Test API
        run: mvn -f ${{ env.API_SERVICE_DIR }}/pom.xml test

  dockerize-backend-service:
    runs-on: ubuntu-latest
    needs: test-backend-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: mvn -f backend-service/pom.xml clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-service
          push: true
          tags: andela007/backend-service:latest

  dockerize-api-service:
    runs-on: ubuntu-latest
    needs: test-api-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        run: mvn -f api-service/pom.xml clean package

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api-service
          push: true
          tags: andela007/api-service:latest
          
  dockerize-frontend-service:
    runs-on: ubuntu-latest
    needs: [test-backend-service, test-api-service]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-service
          push: true
          tags: andela007/frontend-service:latest

  deploy-backend-service:
    runs-on: self-hosted
    needs: dockerize-backend-service

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend service
        run: kubectl apply -f k8s/backend-service/

  deploy-api-service:
    runs-on: self-hosted
    needs: dockerize-api-service

    steps:
      - uses: actions/checkout@v4

      - name: Deploy api service
        run: kubectl apply -f k8s/api-service/


  deploy-frontend-service:
    runs-on: self-hosted
    needs: dockerize-frontend-service

    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend service
        run: kubectl apply -f k8s/frontend-service/

