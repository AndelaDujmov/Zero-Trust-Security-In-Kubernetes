apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: frontend-service
  name: frontend-service

spec:
  replicas: 1

  selector:
    matchLabels:
      io.kompose.service: frontend-service

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        io.kompose.service: frontend-service

    spec:
      serviceAccountName: frontend-sa  
      automountServiceAccountToken: false
      containers:
        - image: andela007/frontend-service:latest
          name: frontend-service
          imagePullPolicy: Always

          ports:
            - containerPort: 80
              protocol: TCP

          volumeMounts:
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-config
              subPath: nginx.conf

          readinessProbe:
            httpGet:
              path: /status
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

      restartPolicy: Always

      volumes:
        - configMap:
            name: nginx-config
          name: nginx-config