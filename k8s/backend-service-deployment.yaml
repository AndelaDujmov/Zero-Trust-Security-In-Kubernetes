apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: backend-service
  name: backend-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: backend-service
    spec:
      containers:
        - image: backend_image
          name: backend-service
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
