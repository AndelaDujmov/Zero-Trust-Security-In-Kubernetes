apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-backend
spec:
  podSelector:
    matchLabels:
      io.kompose.service: backend-service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              io.kompose.service: api-service
  policyTypes:
    - Ingress