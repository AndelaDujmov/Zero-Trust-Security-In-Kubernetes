apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      io.kompose.service: frontend-service   # <-- fixed label
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              io.kompose.service: api-service
      ports:
        - protocol: TCP
          port: 8081
    - to:                                    # DNS resolution
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    - to:                                    # internet egress
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8      # exclude cluster-internal ranges
              - 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443