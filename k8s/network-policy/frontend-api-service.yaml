apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-api
  namespace: default
spec:
  podSelector:
    matchLabels:
      io.kompose.service: api-service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              io.kompose.service: frontend-service
        - podSelector:
            matchLabels:
              io.kompose.service: backend-service