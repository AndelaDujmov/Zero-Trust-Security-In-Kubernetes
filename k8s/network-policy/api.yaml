apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      io.kompose.service: api-service
  policyTypes:
    - Ingress   # <-- was missing!
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              io.kompose.service: frontend-service
        - podSelector:
            matchLabels:
              io.kompose.service: backend-service
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              io.kompose.service: backend-service
      ports:
        - protocol: TCP
          port: 8080